name: zizmor GitHub Actions Security Analysis

on:
  push:
    branches: [main]
    paths:
      - .github/actions/**
      - .github/workflows/**
  pull_request:
    branches: ["**"]
    paths:
      - .github/actions/**
      - .github/workflows/**
permissions: {}
concurrency:
  group: zizmor-analysis
  cancel-in-progress: true
jobs:
  zizmor:
    name: zizmor latest via PyPI
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload SARIF results to GitHub Code Scanning
      contents: read # Required to checkout the repository
      actions: read # Required for zizmor to analyze workflow files via the GitHub API
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Run zizmor
        run: uvx zizmor --format sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@7e3036b9cd87fc26dd06747b7aa4b96c27aaef3a
        with:
          sarif_file: results.sarif
          category: zizmor
